<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle City - Natural Order ECS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            flex-direction: column;
            color: #fff;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            border: 4px solid #555;
            background: #000;
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.3), inset 0 0 20px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .header {
            text-align: center;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 20px;
            color: #FF4500;
            text-shadow: 0 0 10px rgba(255, 69, 0, 0.5);
            letter-spacing: 4px;
        }

        .header p {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .controls {
            margin-top: 16px;
            display: flex;
            gap: 24px;
            font-size: 12px;
            color: #666;
        }

        .controls span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .key {
            background: #333;
            border: 1px solid #555;
            border-radius: 3px;
            padding: 2px 6px;
            font-size: 11px;
            color: #ccc;
        }

        .footer {
            margin-top: 12px;
            font-size: 10px;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>BATTLE CITY</h1>
        <p>Natural Order ECS Architecture &bull; JavaScript</p>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls">
        <span><span class="key">W A S D</span> Move</span>
        <span><span class="key">Space</span> Fire</span>
        <span><span class="key">Enter</span> Start / Next</span>
    </div>

    <div class="footer">
        E (Entity) = Event &bull; C (Component) = Data Carrier &bull; S (System) = Pure Function
    </div>

    <script type="module">
        import { Game } from './js/game/Game.js';

        const canvas = document.getElementById('gameCanvas');
        const game = new Game(canvas);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Enter') {
                e.preventDefault();
                game.handleKeyPress('Enter');
            }
            if (e.code === 'KeyL') {
                e.preventDefault();
                game.handleKeyPress('KeyL');
            }
        });

        game.run();
    </script>
</body>
</html>
